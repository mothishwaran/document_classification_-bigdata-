services:
  # ===================== KAFKA (KRaft mode) =====================
  kafka:
    image: apache/kafka:3.7.0
    container_name: project-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    networks:
      - hadoop-net

  # ===================== HDFS =====================
  project-namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: project-namenode
    hostname: project-namenode
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      - CLUSTER_NAME=projectcluster
      - CORE_CONF_fs_defaultFS=hdfs://project-namenode:9000
      - HDFS_CONF_dfs_webhdfs_enabled=true
      - HDFS_CONF_dfs_permissions_enabled=false
    volumes:
      - project_namenode:/hadoop/dfs/name
    networks:
      - hadoop-net

  project-datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: project-datanode
    hostname: project-datanode
    depends_on:
      - project-namenode
    ports:
      - "9864:9864"
    environment:
      - CLUSTER_NAME=projectcluster
      - CORE_CONF_fs_defaultFS=hdfs://project-namenode:9000
      - HDFS_CONF_dfs_datanode_data_dir=file:///hadoop/dfs/data
    volumes:
      - project_datanode:/hadoop/dfs/data
    networks:
      - hadoop-net


  # ===================== SPARK (Batch Processing) =====================
  project-spark-master:
    image: apache/spark:3.5.1
    container_name: project-spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    depends_on:
      - project-namenode
      - project-datanode
    networks:
      - hadoop-net

  project-spark-worker:
    image: apache/spark:3.5.1
    container_name: project-spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://project-spark-master:7077
    depends_on:
      - project-spark-master
    networks:
      - hadoop-net

  # ===================== OCR SERVICE (Microservice) =====================
  project-ocr:
    build:
      context: ../ocr_services
      dockerfile: Dockerfile
    container_name: project-ocr
    volumes:
      - ../ocr_services:/app
    networks:
      - hadoop-net
    depends_on:
      - project-namenode


networks:
  hadoop-net:
    driver: bridge




